<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mervi Berry - لوحة التحكم التفاعلية</title>
    <!-- استيراد خط تجوال المطابق للتصميم -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة Chart.js للرسوم البيانية -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-pastel: #fdf8f5; /* لون الخلفية الدافئ الناعم في الصورة */
            --text-main: #3d3d3d;
            --text-sub: #8c8c8c;
            --card-shadow: 0 10px 30px rgba(163, 140, 129, 0.08);
            --border-radius: 20px;
        }

        * {
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-pastel);
            color: var(--text-main);
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ================= الهيدر العلوي ================= */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .top-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .dropdown-filter {
            background: white;
            padding: 10px 18px;
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            border: 1px solid #f2ece9;
            font-size: 14px;
            color: var(--text-main);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .dropdown-filter i {
            color: #f2789f;
        }

        .btn-clear {
            background: none;
            border: 1px dashed #e74c3c;
            color: #e74c3c;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-clear:hover {
            background: #fdf2f2;
        }

        /* ================= شبكة الكروت الأربعة ================= */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            padding: 22px;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-info h3 {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-info p {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-info p span {
            font-size: 14px;
            color: var(--text-sub);
            font-weight: 400;
        }

        .stat-icon {
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-purple { color: #b19ffb; }
        .icon-gold { color: #ffc107; }
        .icon-teal { color: #4bc4c4; }

        /* ================= القسم الرئيسي (عمودين) ================= */
        .main-content {
            display: grid;
            grid-template-columns: 1.8fr 1.2fr;
            gap: 25px;
        }

        .section-card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            padding: 25px;
            min-height: 420px;
        }

        .section-card h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        /* منطقة الرسم البياني مع طبقة الأيقونات */
        .chart-wrapper {
            position: relative;
            height: 330px;
            width: 100%;
        }

        /* أنيميشن حركة الفواكه تحت الأعمدة */
        .animated-flavor-emoji {
            font-size: 28px;
            animation: fruitFloat 2.4s ease-in-out infinite;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            user-select: none;
        }

        @keyframes fruitFloat {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-8px) rotate(8deg) scale(1.08); }
        }

        /* قائمة أحدث التعليقات */
        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .comment-item {
            border-bottom: 1px solid #fcf6f3;
            padding-bottom: 15px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .heart-btn {
            color: #f2789f;
            font-size: 18px;
            margin-top: 3px;
        }

        .comment-details {
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-align: right;
        }

        .comment-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.5;
        }

        .comment-time {
            font-size: 12px;
            color: var(--text-sub);
        }

        .view-all-btn {
            width: 100%;
            background: transparent;
            border: 1px solid #f5ebe6;
            padding: 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-sub);
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
            text-align: center;
        }

        .view-all-btn:hover {
            background: #fff5f7;
            border-color: #f2789f;
            color: #f2789f;
        }

        .no-data-alert {
            text-align: center;
            color: var(--text-sub);
            padding-top: 80px;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- الهيدر العلوي -->
        <div class="top-header">
            <h1>لوحة التحكم 🍦</h1>
            <div class="header-actions">
                <button class="btn-clear" onclick="clearRatings()"><i class="fas fa-trash"></i> مسح البيانات</button>
                <div class="dropdown-filter" onclick="loadRealtimeData()">
                    <span>تحديث البيانات</span>
                    <i class="fas fa-sync-alt"></i>
                </div>
            </div>
        </div>

        <!-- كروت الإحصائيات الأربعة -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-info">
                    <h3>إجمالي التقييمات</h3>
                    <p id="stat-total-evals">0</p>
                </div>
                <div class="stat-icon icon-purple"><i class="fas fa-users"></i></div>
            </div>

            <div class="stat-card">
                <div class="stat-info">
                    <h3>متوسط التقييم العام</h3>
                    <p id="stat-avg-rating">0.0 <span>/10</span></p>
                </div>
                <div class="stat-icon icon-gold"><i class="fas fa-star"></i></div>
            </div>

            <div class="stat-card">
                <div class="stat-info">
                    <h3>إجمالي التعليقات</h3>
                    <p id="stat-total-comments">0</p>
                </div>
                <div class="stat-icon icon-teal"><i class="fas fa-comment-dots"></i></div>
            </div>

            <div class="stat-card">
                <div class="stat-info">
                    <h3>أكثر نكهة محبوبة</h3>
                    <p id="stat-top-flavor" style="font-size: 20px; margin-top: 5px;">-</p>
                </div>
                <div class="stat-icon" id="stat-top-emoji" style="font-size: 35px;">🍦</div>
            </div>
        </div>

        <!-- الجزء السفلي -->
        <div class="main-content">
            
            <!-- العمود الأيمن: الرسم البياني التفاعلي بالفواكه العائمة -->
            <div class="section-card">
                <h2>متوسط تقييم كل نكهة</h2>
                <div class="chart-wrapper">
                    <canvas id="realtimeFlavorChart"></canvas>
                    <!-- الطبقة السحرية لعرض الفواكه المتحركة فوق الأعمدة -->
                    <div id="chart-emoji-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden;"></div>
                    <div id="no-chart-msg" class="no-data-alert" style="display: none;">لا توجد بيانات كافية لرسم المخطط البياني.</div>
                </div>
            </div>

            <!-- العمود الأيسر: تعليقات واقتراحات عملائك -->
            <div class="section-card" style="display: flex; flex-direction: column; justify-content: space-between;">
                <div>
                    <h2>آخر التعليقات</h2>
                    <div class="comments-list" id="realtime-comments-box">
                        <!-- تُعرض التعليقات هنا ديناميكياً -->
                    </div>
                </div>
                <button class="view-all-btn">عرض كل التعليقات</button>
            </div>

        </div>
    </div>

    <script>
        let myChart = null;
        // خريطة الإيموجيات الخاصة بنكهاتك الحقيقية
        const flavorEmojis = { "المانجو": "🥭", "البطيخ": "🍉", "الأوريو": "🍪", "الفراولة": "🍓" };

        function loadRealtimeData() {
            const ratings = JSON.parse(localStorage.getItem('mervi_ratings')) || [];
            
            let totalEvals = ratings.length;
            let totalComments = 0;
            let flavorSums = { "المانجو": 0, "البطيخ": 0, "الأوريو": 0, "الفراولة": 0 };
            let flavorCounts = { "المانجو": 0, "البطيخ": 0, "الأوريو": 0, "الفراولة": 0 };
            
            let commentsHTML = "";
            let grandTotalScore = 0;
            let grandTotalCount = 0;

            ratings.forEach(item => {
                if (item.suggestion && item.suggestion.trim() !== "" && item.suggestion !== "لا يوجد اقتراح") {
                    totalComments++;
                    if (totalComments <= 3) {
                        commentsHTML += `
                            <div class="comment-item">
                                <div class="heart-btn"><i class="fas fa-heart"></i></div>
                                <div class="comment-details">
                                    <span class="comment-text">${item.suggestion}</span>
                                    <span class="comment-time">${item.date || 'منذ قليل'}</span>
                                </div>
                            </div>
                        `;
                    }
                }

                for (const [rawName, score] of Object.entries(item.flavors)) {
                    let cleanName = rawName.replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/[^\u0621-\u064A]/g, '').trim(); 
                    if (cleanName.includes("المانجو")) cleanName = "المانجو";
                    if (cleanName.includes("البطيخ")) cleanName = "البطيخ";
                    if (cleanName.includes("الأوريو") || cleanName.includes("الاوريو")) cleanName = "الأوريو";
                    if (cleanName.includes("الفراولة")) cleanName = "الفراولة";

                    if (flavorSums[cleanName] !== undefined) {
                        flavorSums[cleanName] += Number(score);
                        flavorCounts[cleanName]++;
                        grandTotalScore += Number(score);
                        grandTotalCount++;
                    }
                }
            });

            let flavorAverages = { "المانجو": 0, "البطيخ": 0, "الأوريو": 0, "الفراولة": 0 };
            for (const key in flavorSums) {
                flavorAverages[key] = flavorCounts[key] > 0 ? Number((flavorSums[key] / flavorCounts[key]).toFixed(1)) : 0;
            }

            document.getElementById('stat-total-evals').innerText = totalEvals;
            document.getElementById('stat-total-comments').innerText = totalComments;
            
            const finalGeneralAvg = grandTotalCount > 0 ? (grandTotalScore / grandTotalCount).toFixed(1) : "0.0";
            document.getElementById('stat-avg-rating').innerHTML = `${finalGeneralAvg} <span>/10</span>`;

            if (totalEvals > 0) {
                let topFlavor = Object.keys(flavorAverages).reduce((a, b) => flavorAverages[a] > flavorAverages[b] ? a : b);
                if(flavorAverages[topFlavor] > 0) {
                    document.getElementById('stat-top-flavor').innerText = topFlavor;
                    document.getElementById('stat-top-emoji').innerText = flavorEmojis[topFlavor];
                } else {
                    document.getElementById('stat-top-flavor').innerText = "لا يوجد";
                    document.getElementById('stat-top-emoji').innerText = "🍦";
                }
            } else {
                document.getElementById('stat-top-flavor').innerText = "-";
                document.getElementById('stat-top-emoji').innerText = "🍦";
            }

            const commentsBox = document.getElementById('realtime-comments-box');
            if (commentsHTML !== "") {
                commentsBox.innerHTML = commentsHTML;
            } else {
                commentsBox.innerHTML = `<div class="no-data-alert" style="padding-top:40px;">لا توجد تعليقات مكتوبة حتى الآن.</div>`;
            }

            const ctx = document.getElementById('realtimeFlavorChart').getContext('2d');
            const emojiOverlay = document.getElementById('chart-emoji-overlay');
            
            if (myChart) myChart.destroy();
            emojiOverlay.innerHTML = ""; // تصفير الأيقونات السابقة

            if (totalEvals === 0) {
                document.getElementById('no-chart-msg').style.display = "block";
                document.getElementById('realtimeFlavorChart').style.display = "none";
                return;
            }

            document.getElementById('no-chart-msg').style.display = "none";
            document.getElementById('realtimeFlavorChart').style.display = "block";

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(flavorAverages),
                    datasets: [{
                        data: Object.values(flavorAverages),
                        backgroundColor: ['#ffb85c', '#f3819e', '#4bc4c4', '#f06281'], 
                        borderRadius: 25, 
                        borderSkipped: false,
                        barThickness: 35
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            min: 0,
                            max: 10,
                            grid: { display: false, drawBorder: false },
                            ticks: { font: { family: 'Tajawal', size: 11 }, color: '#8c8c8c' }
                        },
                        x: {
                            grid: { display: false, drawBorder: false },
                            ticks: { font: { family: 'Tajawal', size: 13, weight: 'bold' }, color: '#3d3d3d' }
                        }
                    },
                    plugins: { legend: { display: false } }
                },
                // إضافة بلجن مخصص لحساب مكان قاعدة العمود وإنتاج الفواكه المتحركة فوقها حياً وبدقة
                plugins: [{
                    id: 'liveFruitPillsAndLabels',
                    afterDatasetsDraw(chart) {
                        const {ctx, data} = chart;
                        ctx.save();
                        
                        // تنظيف الأيقونات المحقونة سابقاً لتجنب التكرار عند إعادة الرسم أو تغيير الحجم
                        emojiOverlay.innerHTML = "";

                        chart.getDatasetMeta(0).data.forEach((dataPoint, index) => {
                            const value = data.datasets[0].data[index];
                            const flavorName = data.labels[index];
                            const currentEmoji = flavorEmojis[flavorName] || "🍦";
                            
                            // 1. كتابة الأرقام فوق الأعمدة كالعادة
                            if(value > 0) {
                                ctx.font = 'bold 13px Tajawal';
                                ctx.fillStyle = '#3d3d3d';
                                ctx.textAlign = 'center';
                                ctx.fillText(Number(value).toFixed(1), dataPoint.x, dataPoint.y - 12);
                            }

                            // 2. حساب وحقن أيقونة الفاكهة المتحركة عند قاعدة الكبسولة الملونة تماماً
                            const fruitDiv = document.createElement('div');
                            fruitDiv.style.position = 'absolute';
                            fruitDiv.style.left = dataPoint.x + 'px';
                            // وضعها فوق خط القاعدة بـ 15 بكسل لتتداخل بشكل رائع وجذاب مع التصميم
                            fruitDiv.style.top = (dataPoint.base - 15) + 'px'; 
                            fruitDiv.style.transform = 'translate(-50%, -50%)';
                            fruitDiv.style.pointerEvents = 'none';
                            
                            // إعطاء كل نكهة توقيت حركة (Delay) مختلف ومميز لتتحرك الفواكه بملء العفوية والمرح
                            const delayTime = (index * 0.4) + "s";
                            fruitDiv.innerHTML = `<div class="animated-flavor-emoji" style="animation-delay: ${delayTime}">${currentEmoji}</div>`;
                            
                            emojiOverlay.appendChild(fruitDiv);
                        });
                    }
                }]
            });
        }

        function clearRatings() {
            if (confirm("هل تريد مسح سجل التقييمات الحالية لتصفير اللوحة؟")) {
                localStorage.removeItem('mervi_ratings');
                loadRealtimeData();
            }
        }

        window.onload = loadRealtimeData;
    </script>
</body>
</html>
