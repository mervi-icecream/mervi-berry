<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mervi Berry - لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-cream: #fdfbf7;
            --card-bg: #ffffff;
            --text-main: #2d2d2d;
            --text-muted: #8a8a8a;
            --border-color: #faf3ee;
            
            /* ألوان النكهات الباستيلية المتطابقة مع الصورة */
            --color-mango: #ffc366;
            --color-watermelon: #ff8fa3;
            --color-oreo: #72efdd;
            --color-strawberry: #ff758f;
            --color-blueberry: #b39ddb;
            
            /* ألوان الأيقونات العلويّة */
            --icon-purple: #b39ddb;
            --icon-gold: #ffb03b;
            --icon-teal: #4db6ac;
        }

        * {
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-main);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* الهيدر العلوي المتطابق */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .dash-title h1 {
            font-size: 26px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        .time-filter {
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(165, 140, 120, 0.04);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            border: 1px solid rgba(0,0,0,0.02);
            cursor: pointer;
        }
        .time-filter i.fa-calendar-alt {
            color: #ff758f;
        }

        /* كروت الإحصائيات الأربعة العلوية */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 35px;
        }

        @media (max-width: 992px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 576px) {
            .stats-grid { grid-template-columns: 1fr; }
        }

        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(165, 140, 120, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.01);
        }

        .stat-info h3 {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .stat-info .number {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
        }
        
        .stat-info .number-wrapper {
            display: flex;
            align-items: baseline;
        }
        .stat-info .sub-num {
            font-size: 16px;
            color: var(--text-muted);
            margin-right: 4px;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        /* توزيع خلفيات الأيقونات حسب الصورة المرفقة */
        .stat-icon.mango-style { font-size: 35px; background: transparent; }
        .stat-icon.comment-style { background: #e0f2f1; color: var(--icon-teal); }
        .stat-icon.star-style { background: #fff8e1; color: var(--icon-gold); }
        .stat-icon.users-style { background: #f3e5f5; color: var(--icon-purple); }

        /* منطقة المحتوى الرئيسية (قسمين) */
        .main-content-grid {
            display: grid;
            grid-template-columns: 1.8fr 1.2fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .main-content-grid { grid-template-columns: 1fr; }
        }

        .dashboard-section-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(165, 140, 120, 0.04);
            border: 1px solid rgba(0,0,0,0.01);
            display: flex;
            flex-direction: column;
        }

        .dashboard-section-card h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 30px;
        }

        /* تصميم الرسم البياني العمودي المصمم خصيصاً ليطابق الصورة */
        .chart-axis-wrapper {
            display: flex;
            height: 280px;
            margin-bottom: 20px;
        }

        .y-axis-labels {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 220px;
            color: #cccccc;
            font-size: 13px;
            width: 30px;
            padding-left: 5px;
        }

        .chart-bars-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            flex: 1;
            height: 220px;
            border-bottom: 2px solid #f5ebe6;
            position: relative;
            padding: 0 10px;
        }

        .bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
            position: relative;
            width: 60px;
        }

        .bar-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .vertical-bar-column {
            width: 36px;
            border-radius: 20px 20px 0 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            position: relative;
            height: 0%; /* يتم تغييرها جافاسكربت */
            transition: height 1s cubic-bezier(0.1, 1, 0.1, 1);
        }

        .bar-emoji-circle {
            width: 32px;
            height: 32px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            position: absolute;
            bottom: -16px;
            z-index: 3;
            font-size: 16px;
        }

        .bar-label-name {
            position: absolute;
            bottom: -45px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
        }

        /* قسم التعليقات والأراء المستلمة */
        .comments-list {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            max-height: 320px;
            margin-bottom: 20px;
            padding-left: 5px;
        }

        .comment-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-heart-btn {
            color: #ff758f;
            font-size: 20px;
            cursor: pointer;
            margin-top: 2px;
            transition: transform 0.2s;
        }
        .comment-heart-btn:hover {
            transform: scale(1.15);
        }

        .comment-details {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .comment-text-body {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.5;
        }

        .comment-time-stamp {
            font-size: 12px;
            color: var(--text-muted);
        }

        .view-all-comments-btn {
            background: #fdfbf7;
            border: 1px solid #fae7e8;
            color: var(--text-main);
            padding: 12px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            text-align: center;
            transition: all 0.3s ease;
            margin-top: auto;
        }
        .view-all-comments-btn:hover {
            background: #fff0f2;
            border-color: #ff758f;
        }

        .no-data-placeholder {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
            font-style: italic;
            font-size: 14px;
            width: 100%;
        }

        /* تحسين مظهر شريط التمرير */
        .comments-list::-webkit-scrollbar { width: 5px; }
        .comments-list::-webkit-scrollbar-track { background: transparent; }
        .comments-list::-webkit-scrollbar-thumb { background: #fae7e8; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <!-- الهيدر الرئيسي -->
        <header class="dash-header">
            <div class="dash-title">
                <h1>لوحة التحكم 🧊</h1>
            </div>
            <div class="time-filter" onclick="location.reload();">
                <i class="far fa-calendar-alt"></i>
                <span>آخر 30 يوم</span>
                <i class="fas fa-chevron-down" style="font-size: 11px; color: #aaa; margin-right: 5px;"></i>
            </div>
        </header>

        <!-- كروت الإحصائيات الأربعة المتطابقة مع الصورة المرفقة -->
        <div class="stats-grid">
            
            <!-- الكرت الأول: أكثر نكهة محبوبة -->
            <div class="stat-card">
                <div class="stat-info">
                    <h3>أكثر نكهة محبوبة</h3>
                    <div class="number" id="top-flavor-name" style="font-size: 24px;">--</div>
                </div>
                <div class="stat-icon mango-style" id="top-flavor-emoji">🥭</div>
            </div>

            <!-- الكرت الثاني: إجمالي التعليقات -->
            <div class="stat-card">
                <div class="stat-info">
                    <h3>إجمالي التعليقات</h3>
                    <div class="number" id="total-comments-count">0</div>
                </div>
                <div class="stat-icon comment-style"><i class="far fa-comment-dots"></i></div>
            </div>

            <!-- الكرت الثالث: متوسط التقييم العام -->
            <div class="stat-card">
                <div class="stat-info">
                    <h3>متوسط التقييم العام</h3>
                    <div class="number-wrapper">
                        <span class="number" id="average-general-rating">0</span>
                        <span class="sub-num">/10</span>
                    </div>
                </div>
                <div class="stat-icon star-style"><i class="fas fa-star"></i></div>
            </div>

            <!-- الكرت الرابع: إجمالي التقييمات -->
            <div class="stat-card">
                <div class="stat-info">
                    <h3>إجمالي التقييمات</h3>
                    <div class="number" id="total-reviews-count">0</div>
                </div>
                <div class="stat-icon users-style"><i class="fas fa-users"></i></div>
            </div>

        </div>

        <!-- منطقة المحتوى الرئيسية -->
        <div class="main-content-grid">
            
            <!-- الرسم البياني العمودي المتطور لنكهات الخمسة الرئيسية -->
            <div class="dashboard-section-card">
                <h2>متوسط تقييم كل نكهة</h2>
                
                <div class="chart-axis-wrapper">
                    <!-- عمود الأرقام الجانبية للرسم البياني -->
                    <div class="y-axis-labels">
                        <span>10</span>
                        <span>8</span>
                        <span>6</span>
                        <span>4</span>
                        <span>2</span>
                        <span>0</span>
                    </div>
                    
                    <!-- الحاوية المرنة للأعمدة الملونة -->
                    <div class="chart-bars-container" id="vertical-chart-flex">
                        <div class="no-data-placeholder">جاري تحميل البيانات السحابية...</div>
                    </div>
                </div>
            </div>

            <!-- قسم آخر التعليقات المستلمة بشكلها الراقي -->
            <div class="dashboard-section-card">
                <h2>آخر التعليقات</h2>
                
                <div class="comments-list" id="unified-comments-feed">
                    <div class="no-data-placeholder">لا توجد تعليقات حتى الآن</div>
                </div>
                
                <button class="view-all-comments-btn" onclick="alert('يتم عرض جميع التعليقات الحية تلقائياً في القائمة أعلاه!')">عرض كل التعليقات</button>
            </div>

        </div>

    </div>

    <!-- كود الجافا سكريبت السحابي المطور المتصل بـ Firebase لترجمة التصميم الجديد -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // إعدادات قاعدة البيانات السحابية الحالية المستقرة والمفعلة
        const firebaseConfig = {
            apiKey: "AIzaSyD--9rRcIZeOwoRqha46pM6uRp8AqYWs4",
            authDomain: "mervi-berry-db.firebaseapp.com",
            projectId: "mervi-berry-db",
            storageBucket: "mervi-berry-db.firebasestorage.app",
            messagingSenderId: "1089066487686",
            appId: "1:1089066487686:web:3912b7995c8aed1f8aa607",
            measurementId: "G-NXQGFDN52T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const reviewsCollection = collection(db, "reviews");

        // الاتصال المباشر والترتيب حسب الـ id للحصول على أحدث التقييمات
        const q = query(reviewsCollection, orderBy("id", "desc"));
        
        onSnapshot(q, (snapshot) => {
            let fetchedData = [];
            
            snapshot.forEach((docSnapshot) => {
                const itemData = docSnapshot.data();
                
                let itemDate = "قبل قليل";
                if (itemData.date) {
                    itemDate = itemData.date;
                }

                fetchedData.push({
                    flavors: itemData.flavors || {},
                    service: itemData.service || {},
                    notes: itemData.notes || "",
                    suggestion: itemData.suggestion || "",
                    date: itemDate
                });
            });

            // تحديث الواجهة الرسومية بناءً على البيانات المستخرجة
            buildNewDashboardUI(fetchedData);
        });

        function buildNewDashboardUI(data) {
            // 1. تحديث إجمالي التقييمات المستلمة
            document.getElementById('total-reviews-count').innerText = data.length;

            if(data.length === 0) {
                renderEmptyState();
                return;
            }

            // النكهات الخمس المطلوب رسمها بيانياً بالترتيب المتواجد بالصورة المرفقة
            const TargetFlavors = [
                { key: "🥭 المانجو", color: "var(--color-mango)", emoji: "🥭", name: "المانجو" },
                { key: "🍉 البطيخ", color: "var(--color-watermelon)", emoji: "🍉", name: "البطيخ" },
                { key: "🍪 الأوريو", color: "var(--color-oreo)", emoji: "🍪", name: "الأوريو" },
                { key: "🍓 الفراولة", color: "var(--color-strawberry)", emoji: "🍓", name: "الفراولة" },
                { key: "🫐 التوت الأزرق", color: "var(--color-blueberry)", emoji: "🫐", name: "التوت الأزرق" }
            ];

            let flavorTotals = { "🥭 المانجو": 0, "🍉 البطيخ": 0, "🍪 الأوريو": 0, "🍓 الفراولة": 0, "🫐 التوت الأزرق": 0 };
            let totalCommentsCounter = 0;
            let commentsHtml = "";
            let globalScoresSum = 0;
            let globalScoresCount = 0;

            data.forEach(item => {
                // حساب متوسطات تقييم النكهات
                TargetFlavors.forEach(f => {
                    let val = (item.flavors && item.flavors[f.key] !== undefined) ? parseFloat(item.flavors[f.key]) : 8;
                    flavorTotals[f.key] += val;
                    globalScoresSum += val;
                    globalScoresCount++;
                });

                // تجميع وحساب إجمالي التعليقات النصية الحقيقية المتواجدة
                let hasCommentText = false;
                if(item.notes && item.notes !== "لا يوجد" && item.notes.trim() !== "") {
                    commentsHtml += `
                        <div class="comment-item">
                            <div class="comment-heart-btn"><i class="far fa-heart"></i></div>
                            <div class="comment-details">
                                <p class="comment-text-body">${item.notes}</p>
                                <span class="comment-time-stamp">${item.date}</span>
                            </div>
                        </div>`;
                    hasCommentText = true;
                }
                
                if(item.suggestion && item.suggestion !== "لا يوجد" && item.suggestion.trim() !== "") {
                    commentsHtml += `
                        <div class="comment-item">
                            <div class="comment-heart-btn"><i class="far fa-heart"></i></div>
                            <div class="comment-details">
                                <p class="comment-text-body">💡 اقتراح نكهة: ${item.suggestion}</p>
                                <span class="comment-time-stamp">${item.date}</span>
                            </div>
                        </div>`;
                    hasCommentText = true;
                }

                if(hasCommentText) {
                    totalCommentsCounter++;
                }
            });

            // تحديث عداد التعليقات الإجمالي بالكرت العلوي الثاني
            document.getElementById('total-comments-count').innerText = totalCommentsCounter;

            // بناء الأعمدة البيانية العمودية بشكل ديناميكي هندسي متطابق
            let chartContainer = document.getElementById('vertical-chart-flex');
            chartContainer.innerHTML = "";
            
            let highestRating = -1;
            let bestFlavorName = "--";
            let bestFlavorEmoji = "🍦";

            TargetFlavors.forEach(f => {
                let avg = (flavorTotals[f.key] / data.length).toFixed(1);
                let heightPercentage = (avg / 10) * 100;
                
                if(parseFloat(avg) > highestRating) {
                    highestRating = parseFloat(avg);
                    bestFlavorName = f.name;
                    bestFlavorEmoji = f.emoji;
                }

                chartContainer.innerHTML += `
                    <div class="bar-wrapper">
                        <span class="bar-value">${avg}</span>
                        <div class="vertical-bar-column" style="height: ${heightPercentage}%; background: ${f.color};">
                            <div class="bar-emoji-circle">${f.emoji}</div>
                        </div>
                        <span class="bar-label-name">${f.name}</span>
                    </div>
                `;
            });

            // تحديث الكرت الأول: النكهة الأكثر شعبية
            document.getElementById('top-flavor-name').innerText = bestFlavorName;
            document.getElementById('top-flavor-emoji').innerText = bestFlavorEmoji;

            // تحديث الكرت الثالث: متوسط التقييم العام الإجمالي من 10
            let globalAverage = (globalScoresSum / globalScoresCount).toFixed(1);
            document.getElementById('average-general-rating').innerText = globalAverage;

            // تحديث قائمة التعليقات الأخيرة
            document.getElementById('unified-comments-feed').innerHTML = commentsHtml !== "" ? commentsHtml : '<div class="no-data-placeholder">لا توجد تعليقات نصيّة حالياً</div>';
        }

        function renderEmptyState() {
            document.getElementById('vertical-chart-flex').innerHTML = '<div class="no-data-placeholder">لا توجد بيانات نكهات كافية حالياً</div>';
            document.getElementById('top-flavor-name').innerText = "--";
            document.getElementById('total-comments-count').innerText = "0";
            document.getElementById('average-general-rating').innerText = "0";
            document.getElementById('unified-comments-feed').innerHTML = '<div class="no-data-placeholder">لا توجد تعليقات حتى الآن</div>';
        }
    </script>
</body>
</html>
